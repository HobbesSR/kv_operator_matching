model:
  name: "Qwen/Qwen2-7B-Instruct"
  device: "cuda"
  dtype: "bfloat16"

query_bank:
  max_queries: 512
  weighting_scheme: "recency"
  decay_factor: 0.99

beta_fit:
  support_size: 64
  max_iter: 200
  nonneg: true
  surrogate: "lin"

verification:
  threshold: 0.05
  metric: "response_l2"
  holdout_fraction: 0.2

experiment:
  budget_fractions: [0.25, 0.5, 0.75]
  baselines: ["recency", "attention_mass", "uniform"]
  n_prompts: 100
  seed: 42
